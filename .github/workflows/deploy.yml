name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Read the repo, write a Pages deployment, use OIDC for the deploy token.
permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time. Queued runs wait rather than cancel, so a
# fast follow-up commit cannot land before the one in front of it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  check:
    name: Check the site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify internal links and assets
        run: python3 tools/check_links.py

      - name: Verify booking and venue links resolve
        run: python3 tools/check_links.py --external
        continue-on-error: true

  deploy:
    name: Deploy
    needs: check
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
